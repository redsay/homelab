server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          host: homelab
          __path__: /var/log/*.log

  - job_name: homelab_app_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: homelab
          host: homelab
          __path__: /homelab/logs/**/*.log

  - job_name: homelab_json_logs
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            message: message
      - labels:
          level:
          service:
    static_configs:
      - targets:
          - localhost
        labels:
          job: homelab_json
          host: homelab
          __path__: /homelab/logs/**/*.jsonl
