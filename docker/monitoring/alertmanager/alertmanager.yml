global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "webhook-default"

receivers:
  - name: "webhook-default"
    webhook_configs:
      - url: "http://localhost:5001/alerts"
        send_resolved: true
        # Replace with your Slack/Teams webhook URL to enable notifications

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]
